spring.mvc.view.prefix=/WEB-INF/views/

spring.mvc.view.suffix=.jsp

# File paths for text-based database
data.path=src/main/data/


# Server port
server.port=8081

# Logging
logging.level.org.springframework.web=INFO

# Static resources

# Enable default servlet for JSP support in some environments
server.servlet.register-default-servlet=true
